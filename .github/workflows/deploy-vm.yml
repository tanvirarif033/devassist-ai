name: Deploy DevAssist AI to Ubuntu VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Ubuntu VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}

          script: |
            set -e

            echo "===================================="
            echo "Starting DevAssist AI Deployment..."
            echo "===================================="

            echo "Deployment Time:"
            date

            cd ~/devassist-ai

            echo ""
            echo "Updating Repository..."
            git fetch origin
            git reset --hard origin/main

            echo ""
            echo "Current Commit:"
            git rev-parse HEAD

            ################################################
            # Backend
            ################################################

            echo ""
            echo "========== Backend =========="

            cd backend

            npm install

            npm run build

            pm2 restart devassist-backend --update-env

            sleep 5

            pm2 save

            ################################################
            # Frontend
            ################################################

            echo ""
            echo "========== Frontend =========="

            cd ../frontend

            npm install

            npm run build

            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/

            ################################################
            # Nginx
            ################################################

            echo ""
            echo "========== Nginx =========="

            sudo nginx -t
            sudo systemctl reload nginx

            ################################################
            # Verification
            ################################################

            echo ""
            echo "========== PM2 =========="
            pm2 status

            echo ""
            echo "========== Nginx =========="
            systemctl is-active nginx

            echo ""
            echo "========== Backend =========="
            curl --fail http://localhost:5000/api

            echo ""
            echo "========== Frontend =========="
            curl --fail -I https://devassist-ai.duckdns.org

            echo ""
            echo "===================================="
            echo "Deployment Completed Successfully!"
            echo "===================================="