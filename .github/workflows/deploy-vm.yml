name: Deploy DevAssist AI to Ubuntu VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Ubuntu VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}

          script: |
            set -e

            echo "===================================="
            echo "Starting DevAssist AI Deployment..."
            echo "===================================="

            echo "Deployment Time:"
            date

            ####################################
            # Go to Project
            ####################################
            cd ~/devassist-ai

            echo ""
            echo "Updating repository..."
            git fetch origin
            git reset --hard origin/main

            echo ""
            echo "Current Commit:"
            git rev-parse HEAD

            ####################################
            # Backend
            ####################################
            echo ""
            echo "===================================="
            echo "Backend Deployment"
            echo "===================================="

            cd backend

            echo "Installing backend dependencies..."
            npm ci

            echo "Building backend..."
            npm run build

            echo "Restarting backend..."
            pm2 restart devassist-backend --update-env

            sleep 5

            pm2 save

            ####################################
            # Frontend
            ####################################
            echo ""
            echo "===================================="
            echo "Frontend Deployment"
            echo "===================================="

            cd ../frontend

            echo "Installing frontend dependencies..."
            npm ci

            echo "Building frontend..."
            npm run build

            echo "Deploying frontend..."
            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/

            ####################################
            # Nginx
            ####################################
            echo ""
            echo "===================================="
            echo "Reloading Nginx"
            echo "===================================="

            sudo nginx -t
            sudo systemctl reload nginx

            ####################################
            # Verification
            ####################################
            echo ""
            echo "===================================="
            echo "Verification"
            echo "===================================="

            echo ""
            echo "PM2 Status"
            pm2 status

            echo ""
            echo "Nginx Status"
            systemctl is-active nginx

            echo ""
            echo "Backend API"
            curl --fail http://localhost:5000/api

            echo ""
            echo "Frontend"
            curl --fail http://localhost

            echo ""
            echo "===================================="
            echo "Deployment Completed Successfully!"
            echo "===================================="