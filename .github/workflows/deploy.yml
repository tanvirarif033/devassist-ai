name: Deploy DevAssist AI to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "========== Updating Project =========="
            cd ~/devassist-ai
            git fetch origin
            git reset --hard origin/main

            echo "========== Backend =========="
            cd backend
            npm ci
            npm run build
            pm2 restart devassist-backend --update-env

            echo "========== Frontend =========="
            cd ../frontend
            npm ci
            npm run build

            echo "========== Deploy Frontend =========="
            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/

            echo "========== Reload Nginx =========="
            sudo nginx -t
            sudo systemctl reload nginx

            echo "✅ Deployment Successful!"